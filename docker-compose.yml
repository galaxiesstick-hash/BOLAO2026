# Development: PostgreSQL only (app runs with `npm run dev`)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bolao_copa2026
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao_copa2026"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
